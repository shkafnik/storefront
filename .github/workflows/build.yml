name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

env:
  IMAGE: ghcr.io/shkafnik/storefront
  SALEOR_API_URL: https://shale.rh.shadoll.dev/graphql/
  STOREFRONT_URL: https://shop.rh.shadoll.dev
  DEFAULT_CHANNEL: shkafnik-retail

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.run_number }}
          build-args: |
            NEXT_PUBLIC_SALEOR_API_URL=${{ env.SALEOR_API_URL }}
            NEXT_PUBLIC_STOREFRONT_URL=${{ env.STOREFRONT_URL }}
            NEXT_PUBLIC_DEFAULT_CHANNEL=${{ env.DEFAULT_CHANNEL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout k3s repo and update image tag
        env:
          DEPLOY_TOKEN: ${{ secrets.K3S_DEPLOY_TOKEN }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          git clone "https://x-access-token:${DEPLOY_TOKEN}@github.com/shadoll/k3s.git" k3s-repo
          sed -i "s|ghcr.io/shkafnik/storefront:[^ ]*|ghcr.io/shkafnik/storefront:${RUN_NUMBER}|" \
            k3s-repo/clusters/rh/apps/saleor-storefront/deployment.yaml
          cd k3s-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clusters/rh/apps/saleor-storefront/deployment.yaml
          git diff --cached --quiet && echo "No changes, skipping commit" && exit 0
          git commit -m "chore(storefront): deploy image :${RUN_NUMBER}"
          git push
